# Example configuration for AWS CLI (aws) commands via MCP
#
# This exposes a curated set of common AWS CLI operations as MCP tools.
# Each tool takes a single `args` string containing the full AWS CLI arguments.
#
# Notes:
# - These tools run `aws` locally and assume your AWS credentials/config are already set up.
#   Common setups include:
#   - Environment variables: AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_SESSION_TOKEN
#   - ~/.aws/credentials + ~/.aws/config (profiles)
#   - AWS SSO (aws configure sso)
# - Consider using a dedicated, least-privileged AWS profile for safety.
#
# WebSocket authentication configuration (optional)
# Uncomment to enable JWT authentication for WebSocket mode
# [websocket_auth]
# enabled = true
# oidc_issuer = "https://your-oidc-provider.example.com"

[groups.aws]
# Default timeout for AWS CLI commands
default_timeout = 60
default_timeout_max = 600

# Default stop_after: 0 means disabled
default_stop_after = 0
default_stop_after_max = 3600

# Termination settings
default_termination_signal = "SIGTERM"
default_termination_grace_period = 5

# Output limits
default_output_head_lines = 200
default_output_head_lines_max = 2000
default_output_tail_lines = 200
default_output_tail_lines_max = 2000
default_stderr_lines = 100
default_stderr_lines_max = 1000

# ---------------------------------------------------------------------------
# Common, read-only AWS queries
# ---------------------------------------------------------------------------

[[groups.aws.tools]]
name = "whoami"
description = "Show the current AWS caller identity (account, ARN, user/role) using STS."
command = "aws"

# Global flags first, then the operation args.
arg_order = ["profile", "region", "output", "args"]

[groups.aws.tools.parameters.profile]
description = "AWS CLI profile name (from ~/.aws/config). If omitted, uses the default AWS credential resolution chain."
example = "dev"
required = false
flag = "--profile"
takes_value = true

[groups.aws.tools.parameters.region]
description = "AWS region (for regional services). If omitted, AWS CLI defaults apply."
example = "us-east-1"
required = false
flag = "--region"
takes_value = true

[groups.aws.tools.parameters.output]
description = "AWS CLI output format."
example = "json"
required = false
flag = "--output"
takes_value = true

[groups.aws.tools.parameters.args]
description = "AWS CLI arguments including the service and operation. Example: 'sts get-caller-identity'"
example = "sts get-caller-identity"
required = true

[[groups.aws.tools]]
name = "s3_ls"
description = "List S3 buckets or objects."
command = "aws"
arg_order = ["profile", "region", "output", "args"]

[groups.aws.tools.parameters.profile]
description = "AWS CLI profile name (from ~/.aws/config)."
example = "dev"
required = false
flag = "--profile"
takes_value = true

[groups.aws.tools.parameters.region]
description = "AWS region."
example = "us-east-1"
required = false
flag = "--region"
takes_value = true

[groups.aws.tools.parameters.output]
description = "AWS CLI output format."
example = "text"
required = false
flag = "--output"
takes_value = true

[groups.aws.tools.parameters.args]
description = "AWS CLI arguments. Example: 's3 ls' or 's3 ls s3://my-bucket/prefix --recursive'"
example = "s3 ls"
required = true

[[groups.aws.tools]]
name = "ec2_describe_instances"
description = "Describe EC2 instances (optionally filter and/or select fields with --query)."
command = "aws"
arg_order = ["profile", "region", "output", "args"]

[groups.aws.tools.parameters.profile]
description = "AWS CLI profile name (from ~/.aws/config)."
example = "dev"
required = false
flag = "--profile"
takes_value = true

[groups.aws.tools.parameters.region]
description = "AWS region."
example = "us-east-1"
required = false
flag = "--region"
takes_value = true

[groups.aws.tools.parameters.output]
description = "AWS CLI output format."
example = "json"
required = false
flag = "--output"
takes_value = true

[groups.aws.tools.parameters.args]
description = "AWS CLI arguments. Example: 'ec2 describe-instances --max-items 50' or 'ec2 describe-instances --filters Name=instance-state-name,Values=running --query \"Reservations[].Instances[].InstanceId\"'"
example = "ec2 describe-instances --max-items 50"
required = true

[[groups.aws.tools]]
name = "iam_list_roles"
description = "List IAM roles (use --max-items and --query to keep output bounded)."
command = "aws"
arg_order = ["profile", "output", "args"]

[groups.aws.tools.parameters.profile]
description = "AWS CLI profile name (from ~/.aws/config)."
example = "dev"
required = false
flag = "--profile"
takes_value = true

[groups.aws.tools.parameters.output]
description = "AWS CLI output format."
example = "json"
required = false
flag = "--output"
takes_value = true

[groups.aws.tools.parameters.args]
description = "AWS CLI arguments. Example: 'iam list-roles --max-items 100'"
example = "iam list-roles --max-items 100"
required = true

# ---------------------------------------------------------------------------
# CloudWatch Logs (can be long-running when following)
# ---------------------------------------------------------------------------

[[groups.aws.tools]]
name = "logs_tail"
description = "Tail CloudWatch Logs for a log group using AWS CLI v2 'logs tail'. Use --follow for streaming (combine with stop_after runtime override if needed)."
command = "aws"

# If you use --follow, consider setting stop_after at call time.
stop_after = 0
stop_after_max = 3600

arg_order = ["profile", "region", "output", "args"]

[groups.aws.tools.parameters.profile]
description = "AWS CLI profile name (from ~/.aws/config)."
example = "dev"
required = false
flag = "--profile"
takes_value = true

[groups.aws.tools.parameters.region]
description = "AWS region."
example = "us-east-1"
required = false
flag = "--region"
takes_value = true

[groups.aws.tools.parameters.output]
description = "AWS CLI output format."
example = "text"
required = false
flag = "--output"
takes_value = true

[groups.aws.tools.parameters.args]
description = "AWS CLI arguments. Example: 'logs tail /aws/lambda/my-function --since 1h --follow'"
example = "logs tail /aws/lambda/my-function --since 1h"
required = true


