# Example configuration for Podman commands via MCP
# This is a Podman-adapted version of docker_config.toml.
# Podman’s CLI is largely Docker-compatible, so the tools and args look the same.

# WebSocket authentication configuration (optional)
# Uncomment to enable JWT authentication for WebSocket mode
# [websocket_auth]
# enabled = true
# secret = "your-jwt-secret-key-here"

# To disable authentication entirely, omit the [websocket_auth] section

[groups.podman]
# Default timeout for Podman commands (30 seconds)
default_timeout = 30
default_timeout_max = 600 # Allow up to 10 minutes for long-running operations

# Default stop_after: 0 means disabled (wait for normal completion)
default_stop_after = 0
default_stop_after_max = 3600 # Allow up to 1 hour for controlled duration

# Termination settings
default_termination_signal = "SIGTERM"
default_termination_grace_period = 5   # 5 seconds grace period before SIGKILL

# Output limits
default_output_head_lines = 100
default_output_head_lines_max = 1000
default_output_tail_lines = 100
default_output_tail_lines_max = 1000
default_stderr_lines = 50
default_stderr_lines_max = 500

[[groups.podman.tools]]
name = "run"
description = "Run a Podman container. Pass podman run arguments in order: 'run' subcommand, then flags and values, then image name, then command. Example: 'run --name my-container -p 8080:80 -d nginx:latest'"
command = "/usr/bin/podman"

# Tool-specific overrides (inherit from group defaults)
timeout = 60      # podman run can take longer
timeout_max = 600

[groups.podman.tools.parameters.args]
description = "Complete podman run command arguments. Include 'run' subcommand, all flags (--name, -p, -v, -e, -d, etc.), image name, and optional command. Example: 'run --name my-container -p 8080:80 -e NODE_ENV=prod -d nginx:latest' or 'run -p 8080:80 -v /host:/container nginx:latest nginx -g daemon off;'"
example = "run --name my-container -p 8080:80 -d nginx:latest"
required = true

[[groups.podman.tools]]
name = "ps"
description = "List Podman containers. Pass 'ps' subcommand and optional flags like '-a' for all containers, '--filter name=container' for filtering."
command = "/usr/bin/podman"

[groups.podman.tools.parameters.args]
description = "Podman ps arguments. Include 'ps' subcommand and optional flags. Example: 'ps' or 'ps -a' or 'ps --filter name=my-container'"
example = "ps -a"
required = true

[[groups.podman.tools]]
name = "stop"
description = "Stop one or more running Podman containers."
command = "/usr/bin/podman"

[groups.podman.tools.parameters.args]
description = "Podman stop arguments. Include 'stop' subcommand, optional '-t' timeout flag, and container name/ID. Example: 'stop my-container' or 'stop -t 10 my-container'"
example = "stop my-container"
required = true

[[groups.podman.tools]]
name = "rm"
description = "Remove one or more Podman containers."
command = "/usr/bin/podman"

[groups.podman.tools.parameters.args]
description = "Podman rm arguments. Include 'rm' subcommand, optional '-f' or '--force' flag, and container name/ID. Example: 'rm my-container' or 'rm -f my-container'"
example = "rm my-container"
required = true

[[groups.podman.tools]]
name = "logs"
description = "Fetch logs from a Podman container. Use --follow or -f to follow logs (useful with stop_after runtime override)."
command = "/usr/bin/podman"

# Override stop_after for logs with follow=true
stop_after = 0
stop_after_max = 3600 # Allow up to 1 hour for following logs

[groups.podman.tools.parameters.args]
description = "Podman logs arguments. Include 'logs' subcommand, optional flags like '-f' (follow), '--tail N' (last N lines), and container name/ID. Example: 'logs my-container' or 'logs -f --tail 100 my-container'"
example = "logs my-container"
required = true

[[groups.podman.tools]]
name = "exec"
description = "Execute a command in a running Podman container."
command = "/usr/bin/podman"

[groups.podman.tools.parameters.args]
description = "Podman exec arguments. Include 'exec' subcommand, optional flags like '-i' (interactive), '-t' (tty), container name/ID, and command to execute. Example: 'exec my-container ls -la' or 'exec -it my-container /bin/bash'"
example = "exec my-container ls -la /app"
required = true

[[groups.podman.tools]]
name = "inspect"
description = "Return low-level information about Podman objects (containers, images, etc.)."
command = "/usr/bin/podman"

[groups.podman.tools.parameters.args]
description = "Podman inspect arguments. Include 'inspect' subcommand, optional '--format' flag with Go template, and container/image name/ID. Example: 'inspect my-container' or 'inspect --format {{.State.Status}} my-container'"
example = "inspect my-container"
required = true

[[groups.podman.tools]]
name = "images"
description = "List Podman images."
command = "/usr/bin/podman"

[groups.podman.tools.parameters.args]
description = "Podman images arguments. Include 'images' subcommand and optional flags like '-a' (all), '--filter' (filtering). Example: 'images' or 'images -a' or 'images --filter dangling=true'"
example = "images"
required = true

[[groups.podman.tools]]
name = "pull"
description = "Pull a container image from a registry using Podman."
command = "/usr/bin/podman"

# Pulling images can take a while
timeout = 300      # 5 minutes default
timeout_max = 1800 # Allow up to 30 minutes for large images

[groups.podman.tools.parameters.args]
description = "Podman pull arguments. Include 'pull' subcommand and image name. Example: 'pull nginx:latest' or 'pull ubuntu:22.04'"
example = "pull nginx:latest"
required = true

[[groups.podman.tools]]
name = "build"
description = "Build a container image from a Containerfile/Dockerfile using Podman."
command = "/usr/bin/podman"

# Building images can take a long time
timeout = 600      # 10 minutes default
timeout_max = 3600 # Allow up to 1 hour for complex builds

[groups.podman.tools.parameters.args]
description = "Podman build arguments. Include 'build' subcommand, optional flags like '-t' (tag), '-f' (Containerfile/Dockerfile path), and build context path. Example: 'build -t myapp:latest .' or 'build -f Containerfile.prod -t myapp:v1.0 ./myapp'"
example = "build -t myapp:latest ."
required = true
