# Example configuration demonstrating WebSocket authentication options
# This shows different ways to configure JWT authentication for WebSocket mode

# ============================================================================
# OPTION 1: Enable JWT authentication with OIDC issuer (RECOMMENDED)
# ============================================================================
[websocket_auth]
enabled = true
oidc_issuer = "https://your-oidc-provider.com"

# When enabled=true and oidc_issuer is provided:
# - WebSocket connections require Authorization: Bearer <token> header
# - OIDC discovery is performed to fetch JWKS endpoint
# - JWT tokens are validated using JWKS keys from the OIDC provider
# - Invalid or missing tokens result in HTTP 401 Unauthorized
# - Keys are automatically cached and refreshed

# ============================================================================
# OPTION 2: Enable JWT authentication with direct JWKS URL
# ============================================================================
# [websocket_auth]
# enabled = true
# jwks_url = "https://your-oidc-provider.com/.well-known/jwks.json"

# When enabled=true and jwks_url is provided:
# - WebSocket connections require Authorization: Bearer <token> header
# - JWT tokens are validated using JWKS keys from the specified URL
# - Skips OIDC discovery (useful if you know the JWKS URL directly)
# - Keys are automatically cached and refreshed

# ============================================================================
# OPTION 3: Enable JWT authentication with secret key (LEGACY)
# ============================================================================
# [websocket_auth]
# enabled = true
# secret = "your-secret-key-here-change-in-production"

# When enabled=true and secret is provided:
# - WebSocket connections require Authorization: Bearer <token> header
# - JWT tokens are validated using the secret key (HS256 algorithm)
# - Invalid or missing tokens result in HTTP 401 Unauthorized
# - Note: This is legacy mode. Prefer OIDC/JWKS for production use.

# ============================================================================
# OPTION 4: Disable authentication (allow all connections)
# ============================================================================
# [websocket_auth]
# enabled = false

# When enabled=false:
# - WebSocket connections are accepted without authentication
# - No Authorization header required
# - Useful for development or trusted networks

# ============================================================================
# OPTION 5: Omit websocket_auth section entirely
# ============================================================================
# If you don't include [websocket_auth] at all:
# - Authentication is disabled by default
# - All WebSocket connections are accepted
# - Simplest configuration for development

# ============================================================================
# CLI Override
# ============================================================================
# CLI options take precedence over config file:
#   command-mcp serve --config config.toml --mode websocket --oidc-issuer "https://provider.com"
#   command-mcp serve --config config.toml --mode websocket --jwt-secret "cli-secret"
# The --oidc-issuer option is preferred over --jwt-secret.

# ============================================================================
# Example tool groups (same as other configs)
# ============================================================================

[groups.example]
default_timeout = 30
default_timeout_max = 300

  [[groups.example.tools]]
  name = "echo"
  description = "Echo a message"
  command = "/bin/echo"
  
    [groups.example.tools.parameters.message]
    description = "Message to echo"
    required = true

